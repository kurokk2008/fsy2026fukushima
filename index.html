<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f80ed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FSY Checkin">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>fsy2026福島 事前合宿チェックイン</title>

    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --sub: #6b7280;
        --primary: #2f80ed;
        --primary-hover: #1c6fe0;
        --primary-disabled: #b7c7e6;
        --success-bg: #e8f5e9;
        --success-text: #1b5e20;
        --warn-bg: #fff8e1;
        --warn-text: #8d6e00;
        --error-bg: #fdecea;
        --error-text: #b71c1c;
        --notice-bg: #f8f9fa;
        --border: #d7dee8;
        --shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: sans-serif;
      }

      body {
        padding: 20px;
      }

      .card {
        max-width: 460px;
        margin: 24px auto;
        background: var(--card);
        padding: 24px;
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .logo {
        display: block;
        margin: 0 auto 20px;
        max-width: 220px;
        width: 100%;
        height: auto;
      }

      h1 {
        margin: 0 0 20px;
        text-align: center;
        font-size: 24px;
        line-height: 1.4;
      }

      label {
        display: block;
        font-weight: bold;
        margin-top: 14px;
        margin-bottom: 6px;
      }

      .help-text {
        font-size: 12px;
        color: var(--sub);
        margin-top: -2px;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        font-size: 16px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      button {
        width: 100%;
        margin-top: 24px;
        padding: 15px;
        font-size: 17px;
        font-weight: bold;
        color: white;
        background: var(--primary);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:active {
        transform: scale(0.99);
      }

      button:disabled {
        background: var(--primary-disabled);
        cursor: not-allowed;
        transform: none;
      }

      #result {
        margin-top: 24px;
      }

      .panel {
        padding: 14px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      .success-box {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .duplicate-box {
        background: var(--warn-bg);
        color: var(--warn-text);
      }

      .error-box {
        background: var(--error-bg);
        color: var(--error-text);
      }

      .notice-box {
        background: var(--notice-bg);
        padding: 12px;
        border-radius: 10px;
        margin-top: 12px;
      }

      .notice-box p {
        margin: 0 0 8px;
      }

      .notice-box ul {
        margin: 0;
        padding-left: 20px;
      }

      .info-row {
        margin: 10px 0;
        line-height: 1.7;
        word-break: break-word;
      }

      .result-link {
        display: inline-block;
        margin-left: 8px;
        font-size: 14px;
        text-decoration: none;
        font-weight: bold;
        color: var(--primary);
      }

      .result-link:hover {
        text-decoration: underline;
      }

      .loading-text {
        text-align: center;
        color: var(--sub);
        padding: 10px 0;
      }

      .offline-badge {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        background: #fff4e5;
        color: #8a5200;
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
        }

        .card {
          margin: 12px auto;
          padding: 20px 16px;
          border-radius: 14px;
        }

        h1 {
          font-size: 21px;
        }

        button {
          font-size: 16px;
        }
      }

      .home-button {
        display: block;
        width: 100%;
        text-align: center;
        margin-top: 16px;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: bold;
      }

      .home-button:hover {
        background: var(--primary-hover);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img
        class="logo"
        src="./icons/icon-512.png?v=4"
        alt="fsy2026福島 ロゴ"
      >

      <h1>fsy2026福島　事前合宿チェックイン</h1>

      <div id="offlineBadge" class="offline-badge">
        現在オフラインです。通信が回復すると最新情報を取得できます。
      </div>

      <label for="name">名前</label>
      <input
        id="name"
        placeholder="例（日本人）：福島たろう　（英名）：MichaelSmith"
        autocomplete="name"
      >

      <label for="birth">生年月日</label>
      <div class="help-text">※本人確認のため入力してください</div>
      <input id="birth" type="date">

      <button id="checkinButton" type="button">チェックイン</button>

      <div id="result"></div>
    </div>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbzVaHcOm5GX2pKsoRe_YMJ3zY-wqY4FE1zF9WReT_aACgzdBAix3PM9X6iUbE2ShEqhNw/exec";              // fsy2026福島 PWA Ver24
      const PARTICIPANT_HOME_URL = "./participant-home.html";                                                                                            // 登録後の参加者メニュー

      // 安定運用のため、既存の Service Worker を解除
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        }).catch((error) => {
          console.warn("Service Worker unregister failed:", error);
        });
      }

      let isSubmitting = false;

      const button = document.getElementById("checkinButton");
      const result = document.getElementById("result");
      const offlineBadge = document.getElementById("offlineBadge");

      button.addEventListener("click", submitCheckIn);

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function updateOnlineState() {
        offlineBadge.style.display = navigator.onLine ? "none" : "block";
      }

      window.addEventListener("online", updateOnlineState);
      window.addEventListener("offline", updateOnlineState);
      updateOnlineState();

      async function submitCheckIn() {
        if (isSubmitting) return;

        const name = document.getElementById("name").value.trim();
        const birth = document.getElementById("birth").value;

        if (!name || !birth) {
          result.innerHTML = '<div class="panel error-box">名前と生年月日を入力してください。</div>';
          return;
        }

        if (!navigator.onLine) {
          result.innerHTML = '<div class="panel error-box">現在オフラインのため、チェックイン照合を実行できません。通信接続をご確認ください。</div>';
          return;
        }

        isSubmitting = true;
        button.disabled = true;
        button.textContent = "確認中...";
        result.innerHTML = '<div class="loading-text">照合しています…</div>';

        const callbackName = "jsonpCheckInCallback_" + Date.now();

        window[callbackName] = function(res) {
          try {
            showResult(res);
          } finally {
            cleanup();
          }
        };

        function cleanup() {
          isSubmitting = false;
          button.disabled = false;
          button.textContent = "チェックイン";

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          delete window[callbackName];
          clearTimeout(timeoutId);
        }

        const params = new URLSearchParams({
          api: "checkIn",
          name: name,
          birth: birth,
          callback: callbackName,
          t: Date.now().toString()
        });

        const script = document.createElement("script");
        script.src = `${GAS_URL}?${params.toString()}`;

        script.onerror = function() {
          result.innerHTML = '<div class="panel error-box">通信エラーが発生しました。Apps Script公開設定をご確認ください。</div>';
          cleanup();
        };

        const timeoutId = setTimeout(function() {
          result.innerHTML = '<div class="panel error-box">応答がタイムアウトしました。しばらくしてからもう一度お試しください。</div>';
          cleanup();
        }, 15000);

        document.body.appendChild(script);
      }

      function buildNoticeHtml(note) {
        const safeNote = String(note || "").trim();

        if (!safeNote) {
          return `
            <div class="notice-box">
              <p><strong>ご案内</strong></p>
              <p>現在ご案内はありません。</p>
            </div>
          `;
        }

        const items = safeNote
          .split(/\r?\n/)
          .map(item => item.trim())
          .filter(Boolean);

        if (items.length === 0) {
          return `
            <div class="notice-box">
              <p><strong>ご案内</strong></p>
              <p>現在ご案内はありません。</p>
            </div>
          `;
        }

        return `
          <div class="notice-box">
            <p><strong>ご案内</strong></p>
            <ul>
              ${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </div>
        `;
      }

      function buildRoomHtml(res) {
        const room = escapeHtml(res.room || "未設定");
        const link = res.roomMapUrl
          ? `<a class="result-link" href="${escapeHtml(res.roomMapUrl)}" target="_blank" rel="noopener noreferrer">地図を見る</a>`
          : "";

        return `
          <div class="info-row">
            宿泊部屋：${room}
            ${link}
          </div>
        `;
      }

      function buildBaggageHtml(res) {
        const baggage = escapeHtml(res.baggage || "未設定");
        const link = res.baggageMapUrl
          ? `<a class="result-link" href="${escapeHtml(res.baggageMapUrl)}" target="_blank" rel="noopener noreferrer">配置図を見る</a>`
          : "";

        return `
          <div class="info-row">
            荷物置き場：${baggage}
            ${link}
          </div>
        `;
      }

      function showResult(res) {
        if (!res || !res.status) {
          result.innerHTML = '<div class="panel error-box">応答の形式が正しくありません。</div>';
          return;
        }

        const noteHtml = buildNoticeHtml(res.note);
        const roomHtml = buildRoomHtml(res);
        const baggageHtml = buildBaggageHtml(res);

        if (res.status === "ok") {
          localStorage.setItem("participant_name", res.name || "");
          localStorage.setItem("participant_group", res.group || "");
          localStorage.setItem("participant_room", res.room || "");
          localStorage.setItem("participant_baggage", res.baggage || "");

          result.innerHTML = `
            <div class="panel success-box"><strong>${escapeHtml(res.message || "チェックイン完了しました。")}</strong></div>
            <div class="info-row">名前：${escapeHtml(res.name || "")}</div>
            <div class="info-row">グループ：${escapeHtml(res.group || "未設定")}</div>
            ${roomHtml}
            ${baggageHtml}
            <div class="info-row">受付時刻：${escapeHtml(res.checkedInAt || "")}</div>
            ${noteHtml}
            <div class="info-row" style="margin-top:16px;">
              <a class="home-button" href="${PARTICIPANT_HOME_URL}">参加者ホームへ進む</a>
            </div>
          `;
          return;
        }

        if (res.status === "duplicate") {
          localStorage.setItem("participant_name", res.name || "");
          localStorage.setItem("participant_group", res.group || "");
          localStorage.setItem("participant_room", res.room || "");
          localStorage.setItem("participant_baggage", res.baggage || "");

          result.innerHTML = `
            <div class="panel duplicate-box"><strong>${escapeHtml(res.message || "すでにチェックイン済みです。")}</strong></div>
            <div class="info-row">名前：${escapeHtml(res.name || "")}</div>
            <div class="info-row">グループ：${escapeHtml(res.group || "未設定")}</div>
            ${roomHtml}
            ${baggageHtml}
            <div class="info-row">初回受付時刻：${escapeHtml(res.checkedInAt || "記録なし")}</div>
            ${noteHtml}
            <div class="info-row" style="margin-top:16px;">
              <a class="home-button" href="${PARTICIPANT_HOME_URL}">参加者ホームへ進む</a>
            </div>
          `;
          return;
        }

        result.innerHTML = `
          <div class="panel error-box">${escapeHtml(res.message || "該当する参加者が見つかりませんでした。")}</div>
        `;
      }
    </script>
  </body>
</html>
