<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>fsy2026福島 スタッフ画面</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --sub: #6b7280;
        --primary: #2f80ed;
        --primary-hover: #1c6fe0;
        --border: #d7dee8;
        --error-bg: #fdecea;
        --error-text: #b71c1c;
        --ok-bg: #e8f5e9;
        --ok-text: #1b5e20;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 16px;
      }

      h1, h2 {
        margin-top: 0;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .summary-box {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }

      .summary-box .label {
        font-size: 13px;
        color: var(--sub);
        margin-bottom: 8px;
      }

      .summary-box .value {
        font-size: 28px;
        font-weight: bold;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
      }

      button {
        padding: 12px 16px;
        font-size: 15px;
        font-weight: bold;
        color: #fff;
        background: var(--primary);
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button.small {
        padding: 8px 12px;
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      th, td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
      }

      .message {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
      }

      .error {
        background: var(--error-bg);
        color: var(--error-text);
      }

      .ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      @media (max-width: 720px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .row {
          grid-template-columns: 1fr;
        }

        table, thead, tbody, th, td, tr {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border: 1px solid var(--border);
          border-radius: 12px;
          margin-bottom: 12px;
          padding: 10px;
          background: #fff;
        }

        td {
          border: none;
          padding: 6px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>fsy2026福島 スタッフ画面</h1>
        <div class="row">
          <div>
            <label for="staffKey">スタッフキー</label>
            <input id="staffKey" type="password" placeholder="スタッフキーを入力">
          </div>
          <div>
            <button id="loadButton" type="button">読み込み</button>
          </div>
        </div>
        <div id="message"></div>
      </div>

      <div class="card">
        <h2>受付状況</h2>
        <div class="summary">
          <div class="summary-box">
            <div class="label">総人数</div>
            <div class="value" id="totalCount">-</div>
          </div>
          <div class="summary-box">
            <div class="label">受付済み</div>
            <div class="value" id="checkedInCount">-</div>
          </div>
          <div class="summary-box">
            <div class="label">未受付</div>
            <div class="value" id="uncheckedCount">-</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>未チェックイン者一覧</h2>
        <div class="row">
          <div>
            <label for="keyword">名前検索</label>
            <input id="keyword" placeholder="名前の一部を入力">
          </div>
          <div>
            <button id="searchButton" type="button">検索</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>名前</th>
              <th>生年月日</th>
              <th>グループ</th>
              <th>宿泊部屋</th>
              <th>荷物置き場</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxwCjSCGEM5FhMO9nBMtCfWUwdkticPlvmKezgjv4SnuSCEP91cKUEz9wuL1dMCqKdU/exec";              //GASはfsy2026福島 PWA Ver14

      const loadButton = document.getElementById("loadButton");
      const searchButton = document.getElementById("searchButton");
      const message = document.getElementById("message");

      loadButton.addEventListener("click", loadStaffScreen);
      searchButton.addEventListener("click", loadUncheckedList);

      function showMessage(text, type = "ok") {
        message.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
      }

      function clearMessage() {
        message.innerHTML = "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function jsonpRequest(params) {
        return new Promise((resolve, reject) => {
          const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 1000);

          params.callback = callbackName;
          const query = new URLSearchParams(params).toString();
          const script = document.createElement("script");
          script.src = `${GAS_URL}?${query}`;

          const timeoutId = setTimeout(() => {
            cleanup();
            reject(new Error("タイムアウトしました。"));
          }, 15000);

          window[callbackName] = function(res) {
            cleanup();
            resolve(res);
          };

          script.onerror = function() {
            cleanup();
            reject(new Error("通信エラーが発生しました。"));
          };

          function cleanup() {
            clearTimeout(timeoutId);
            if (script.parentNode) script.parentNode.removeChild(script);
            delete window[callbackName];
          }

          document.body.appendChild(script);
        });
      }

      function getStaffKey() {
        return document.getElementById("staffKey").value.trim();
      }

      async function loadStaffScreen() {
        clearMessage();
        await loadSummary();
        await loadUncheckedList();
      }

      async function loadSummary() {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "staffSummary",
            staffKey
          });

          if (res.status !== "ok") {
            showMessage(res.message || "受付状況の取得に失敗しました。", "error");
            return;
          }

          document.getElementById("totalCount").textContent = res.total;
          document.getElementById("checkedInCount").textContent = res.checkedIn;
          document.getElementById("uncheckedCount").textContent = res.unchecked;
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      async function loadUncheckedList() {
        const staffKey = getStaffKey();
        const keyword = document.getElementById("keyword").value.trim();

        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "uncheckedList",
            staffKey,
            keyword
          });

          if (res.status !== "ok") {
            showMessage(res.message || "一覧取得に失敗しました。", "error");
            return;
          }

          renderList(res.items || []);
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      function renderList(items) {
        const tbody = document.getElementById("listBody");

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="6">該当者はいません。</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(item => `
          <tr>
            <td>${escapeHtml(item.name || "")}</td>
            <td>${escapeHtml(item.birth || "")}</td>
            <td>${escapeHtml(item.group || "")}</td>
            <td>${escapeHtml(item.room || "")}</td>
            <td>${escapeHtml(item.baggage || "")}</td>
            <td>
              <button class="small" type="button"
                onclick="manualCheckIn('${escapeHtml(item.name || "")}', '${escapeHtml(item.birth || "")}')">
                手動チェックイン
              </button>
            </td>
          </tr>
        `).join("");
      }

      async function manualCheckIn(name, birth) {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        if (!confirm(`${name} さんを手動チェックインしますか？`)) {
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "manualCheckIn",
            staffKey,
            name,
            birth
          });

          if (res.status === "ok" || res.status === "duplicate") {
            showMessage(res.message || "処理が完了しました。", "ok");
            await loadSummary();
            await loadUncheckedList();
            return;
          }

          showMessage(res.message || "手動チェックインに失敗しました。", "error");
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      // 30秒毎にstaff画面の一覧を更新するインターバルの設定
      
      setInterval(() => {
        if (getStaffKey()) {
          loadSummary();
          loadUncheckedList();
        }
      }, 30000);
    </script>
  </body>
</html>
