<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>fsy2026福島 事前合宿スタッフ画面</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --sub: #6b7280;
        --primary: #2f80ed;
        --primary-hover: #1c6fe0;
        --border: #d7dee8;
        --error-bg: #fdecea;
        --error-text: #b71c1c;
        --ok-bg: #e8f5e9;
        --ok-text: #1b5e20;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        margin-bottom: 16px;
      }

      h1, h2 {
        margin-top: 0;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .summary-box {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }

      .summary-box .label {
        font-size: 13px;
        color: var(--sub);
        margin-bottom: 8px;
      }

      .summary-box .value {
        font-size: 28px;
        font-weight: bold;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
      }

      button {
        padding: 12px 16px;
        font-size: 15px;
        font-weight: bold;
        color: #fff;
        background: var(--primary);
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button.small {
        padding: 8px 12px;
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      th, td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
        white-space: nowrap;
      }

      .message {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
      }

      .error {
        background: var(--error-bg);
        color: var(--error-text);
      }

      .ok {
        background: var(--ok-bg);
        color: var(--ok-text);
      }

      .section-title {
        margin-top: 0;
        margin-bottom: 12px;
      }

      @media (max-width: 900px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .row {
          grid-template-columns: 1fr;
        }

        table, thead, tbody, th, td, tr {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border: 1px solid var(--border);
          border-radius: 12px;
          margin-bottom: 12px;
          padding: 10px;
          background: #fff;
        }

        td {
          border: none;
          padding: 6px 0;
        }
      }

      .form-row {
        margin-bottom: 12px;
      }

      .text-input,
      .text-area {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #d7dee8;
        border-radius: 10px;
        background: #fff;
        box-sizing: border-box;
      }

      .text-area {
        resize: vertical;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .action-button {
        border: none;
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: bold;
        background: #6b7280;
        color: #fff;
      }

      .action-button:hover {
        background: #4b5563;
      }

      .primary-button {
        background: #2f80ed;
      }

      .primary-button:hover {
        background: #1c6fe0;
      }

      .info-box {
        background: #f8fafc;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        padding: 14px;
      }

      #announcementSection {
        max-width: 1100px;
        margin: 0 auto;
      }

      .action-button.primary-button {
        box-shadow: 0 0 0 2px rgba(47,128,237,0.15);
      }

      .announcement-row-hidden {
        opacity: 0.55;
      }

      #checkinSection,
      #announcementSection {
      width: 100%;
      }
      
    </style>
  </head>
  <body>  
    <div class="container">
      <div class="card">
        <h1>fsy2026福島 スタッフ画面</h1>
        <div class="row">
          <div>
            <label for="staffKey">スタッフキー</label>
            <input id="staffKey" type="password" placeholder="スタッフキーを入力">
          </div>
          <div>
            <button id="loadButton" type="button">読み込み</button>
          </div>
        </div>
        <div id="message"></div>
      </div>

      <div class="card">
        <div class="button-row">
          <button id="showCheckinMenuButton" type="button" class="action-button primary-button">チェックイン管理</button>
          <button id="showAnnouncementMenuButton" type="button" class="action-button">お知らせ管理</button>
        </div>
      </div>

      <div id="checkinSection">
        <div class="card">
          <h2>受付状況</h2>
          <div class="summary">
            <div class="summary-box">
              <div class="label">総人数</div>
              <div class="value" id="totalCount">-</div>
            </div>
            <div class="summary-box">
              <div class="label">受付済み</div>
              <div class="value" id="checkedInCount">-</div>
            </div>
            <div class="summary-box">
              <div class="label">未受付</div>
              <div class="value" id="uncheckedCount">-</div>
            </div>
          </div>
        </div>


        <div class="card">
          <h2 class="section-title">未チェックイン者一覧</h2>
          <div class="row">
            <div>
              <label for="uncheckedKeyword">名前検索</label>
              <input id="uncheckedKeyword" placeholder="名前の一部を入力">
            </div>
            <div>
              <button id="uncheckedSearchButton" type="button">検索</button>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>名前</th>
                <th>所属ステーク・地方部</th>
                <th>役割</th>
                <th>グループ</th>
                <th>宿泊部屋</th>
                <th>入所時荷物置き場</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="uncheckedListBody"></tbody>
          </table>
        </div>
        
        <div class="card">
          <h2 class="section-title">受付済み一覧</h2>
          <div class="row">
            <div>
              <label for="checkedKeyword">名前検索</label>
              <input id="checkedKeyword" placeholder="名前の一部を入力">
            </div>
            <div>
              <button id="checkedSearchButton" type="button">検索</button>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>名前</th>
                <th>所属ステーク・地方部</th>
                <th>役割</th>
                <th>グループ</th>
                <th>宿泊部屋</th>
                <th>入所時荷物置き場</th>
                <th>受付時刻</th>
              </tr>
            </thead>
            <tbody id="checkedListBody"></tbody>
          </table>
        </div>
      </div>
    </div>  

    <div id="announcementSection" style="display:none;">
      <div class="card">
        <h2>お知らせ管理</h2>

        <div class="info-box" style="margin-bottom: 12px;">
          <div><strong>編集中の行：</strong><span id="editingAnnouncementRow">新規作成</span></div>
        </div>

        <div class="button-row" style="margin-bottom: 12px;">
          <button id="newAnnouncementButton" type="button" class="action-button">新規作成</button>
        </div>
        
        <div class="form-row">
          <label for="announcementType"><strong>種別</strong></label>
          <select id="announcementType" class="text-input">
            <option value="通常">通常</option>
            <option value="重要">重要</option>
          </select>
        </div>
        
        <div class="form-row">
          <label for="announcementTitle"><strong>タイトル</strong></label>
          <input id="announcementTitle" type="text" class="text-input" placeholder="例：本日のお知らせ">
        </div>

        <div class="form-row">
          <label for="announcementBody"><strong>本文</strong></label>
          <textarea id="announcementBody" class="text-area" rows="5" placeholder="参加者ホームに表示する本文"></textarea>
        </div>

        <div class="form-row">
          <label for="announcementVisible"><strong>表示状態</strong></label>
          <select id="announcementVisible" class="text-input">
            <option value="表示">表示</option>
            <option value="非表示">非表示</option>
          </select>
        </div>

        <div class="button-row">
          <button id="saveAnnouncementButton" type="button" class="action-button primary-button">お知らせを保存</button>
        </div>
      </div>

      <div class="card">
        <h2>お知らせ一覧</h2>
        <table>
          <thead>
            <tr>
              <th>行</th>
              <th>種別</th>
              <th>表示開始</th>
              <th>表示終了</th>
              <th>タイトル</th>
              <th>表示状態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="announcementListBody"></tbody>
        </table>
      </div>
    </div>
      
    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxDozD82e1wseo6kpWM-AIkXAC8acmYfk7UTzkMYrz9Nei2SmqokhotX8ng6jLWPLTDyg/exec"; // fsy2026福島 PWA Ver31
      let currentEditRow = null;
      
      const loadButton = document.getElementById("loadButton");
      const uncheckedSearchButton = document.getElementById("uncheckedSearchButton");
      const checkedSearchButton = document.getElementById("checkedSearchButton");
      const message = document.getElementById("message");

      loadButton.addEventListener("click", loadStaffScreen);
      uncheckedSearchButton.addEventListener("click", loadUncheckedList);
      checkedSearchButton.addEventListener("click", loadCheckedInList);

      function showMessage(text, type = "ok") {
        message.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
      }

      function clearMessage() {
        message.innerHTML = "";
      }

      function showCheckinSection() {
        document.getElementById("checkinSection").style.display = "";
        document.getElementById("announcementSection").style.display = "none";

        document.getElementById("showCheckinMenuButton").classList.add("primary-button");
        document.getElementById("showAnnouncementMenuButton").classList.remove("primary-button");
      }

      function showAnnouncementSection() {
        document.getElementById("checkinSection").style.display = "none";
        document.getElementById("announcementSection").style.display = "";

        document.getElementById("showCheckinMenuButton").classList.remove("primary-button");
        document.getElementById("showAnnouncementMenuButton").classList.add("primary-button");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getStaffKey() {
        return document.getElementById("staffKey").value.trim();
      }

      function jsonpRequest(params) {
        return new Promise((resolve, reject) => {
          const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
          params.callback = callbackName;

          const query = new URLSearchParams(params).toString();
          const url = `${GAS_URL}?${query}`;

          const script = document.createElement("script");
          script.src = url;

          let finished = false;

          const timeoutId = setTimeout(() => {
            if (finished) return;
            finished = true;
            cleanup();
            reject(new Error("タイムアウトしました。"));
          }, 15000);

          window[callbackName] = function(res) {
            if (finished) return;
            finished = true;
            cleanup();
            resolve(res);
          };

          script.onerror = function() {
            if (finished) return;
            finished = true;
            cleanup();
            reject(new Error("通信エラーが発生しました。"));
          };

          function cleanup() {
            clearTimeout(timeoutId);
            if (script.parentNode) {
              script.parentNode.removeChild(script);
            }
            try {
              delete window[callbackName];
            } catch (e) {
              window[callbackName] = undefined;
            }
          }

          document.body.appendChild(script);
        });
      }

      async function loadStaffScreen() {
        clearMessage();
        await loadSummary();
        await loadUncheckedList();
        await loadCheckedInList();
        await loadAnnouncementList();
      }

      async function loadSummary() {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "staffSummary",
            staffKey
          });

          if (res.status !== "ok") {
            showMessage(res.message || "受付状況の取得に失敗しました。", "error");
            return;
          }

          document.getElementById("totalCount").textContent = res.total;
          document.getElementById("checkedInCount").textContent = res.checkedIn;
          document.getElementById("uncheckedCount").textContent = res.unchecked;
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      async function loadUncheckedList() {
        const staffKey = getStaffKey();
        const keyword = document.getElementById("uncheckedKeyword").value.trim();

        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "uncheckedList",
            staffKey,
            keyword
          });

          if (res.status !== "ok") {
            showMessage(res.message || "未チェックイン一覧の取得に失敗しました。", "error");
            return;
          }

          renderUncheckedList(res.items || []);
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      async function loadCheckedInList() {
        const staffKey = getStaffKey();
        const keyword = document.getElementById("checkedKeyword").value.trim();

        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "checkedInList",
            staffKey,
            keyword
          });

          if (res.status !== "ok") {
            showMessage(res.message || "受付済み一覧の取得に失敗しました。", "error");
            return;
          }

          renderCheckedInList(res.items || []);
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      function renderUncheckedList(items) {
        const tbody = document.getElementById("uncheckedListBody");

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="7">該当者はいません。</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(item => `
          <tr>
            <td>${escapeHtml(item.name || "")}</td>
            <td>${escapeHtml(item.stake || "")}</td>
            <td>${escapeHtml(item.role || "")}</td>
            <td>${escapeHtml(item.group || "")}</td>
            <td>${escapeHtml(item.room || "")}</td>
            <td>${escapeHtml(item.baggage || "")}</td>
            <td>
              <button class="small" type="button"
                onclick="manualCheckIn('${String(item.name || "").replace(/'/g, "\\'")}', '${String(item.birth || "").replace(/'/g, "\\'")}')">
                手動チェックイン
              </button>
            </td>
          </tr>
        `).join("");
      }

      function renderCheckedInList(items) {
        const tbody = document.getElementById("checkedListBody");

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="7">該当者はいません。</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(item => `
          <tr>
            <td>${escapeHtml(item.name || "")}</td>
            <td>${escapeHtml(item.stake || "")}</td>
            <td>${escapeHtml(item.role || "")}</td>
            <td>${escapeHtml(item.group || "")}</td>
            <td>${escapeHtml(item.room || "")}</td>
            <td>${escapeHtml(item.baggage || "")}</td>
            <td>${escapeHtml(item.checkedInAt || "")}</td>
          </tr>
        `).join("");
      }

      async function manualCheckIn(name, birth) {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        if (!confirm(`${name} さんを手動チェックインしますか？`)) {
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "manualCheckIn",
            staffKey,
            name,
            birth
          });

          if (res.status === "ok" || res.status === "duplicate") {
            showMessage(res.message || "処理が完了しました。", "ok");
            await loadSummary();
            await loadUncheckedList();
            await loadCheckedInList();
            return;
          }

          showMessage(res.message || "手動チェックインに失敗しました。", "error");
        } catch (error) {
          showMessage(error.message, "error");
        }
      }

      async function loadAnnouncementList() {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "announcementList",
            staffKey
          });

          if (res.status !== "ok") {
            showMessage(res.message || "お知らせ一覧の取得に失敗しました。", "error");
            return;
          }

          renderAnnouncementList(res.items || []);
        } catch (error) {
          showMessage(error.message || "通信エラーが発生しました。", "error");
        }
      }

      function renderAnnouncementList(items) {
        const tbody = document.getElementById("announcementListBody");

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="7">お知らせはありません。</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(item => {
          const rowClass = item.visible === "非表示" ? "announcement-row-hidden" : "";

          return `
            <tr class="${rowClass}">
              <td>${escapeHtml(item.rowNumber || "")}</td>
              <td>${escapeHtml(item.type || "")}</td>
              <td>${escapeHtml(item.start || "")}</td>
              <td>${escapeHtml(item.end || "")}</td>
              <td>${escapeHtml(item.title || "")}</td>
              <td>${escapeHtml(item.visible || "")}</td>
              <td>
                <button class="small" type="button" onclick="editAnnouncement(${item.rowNumber})">編集</button>
                <button class="small" type="button" onclick="hideAnnouncement(${item.rowNumber})">非表示</button>
              </td>
            </tr>
          `;
        }).join("");
      }

      function resetAnnouncementForm() {
        currentEditRow = null;
        document.getElementById("editingAnnouncementRow").textContent = "新規作成";
        document.getElementById("announcementType").value = "通常";
        document.getElementById("announcementTitle").value = "";
        document.getElementById("announcementBody").value = "";
        document.getElementById("announcementVisible").value = "表示";
      }

      async function editAnnouncement(rowNumber) {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "announcementGetByRow",
            staffKey,
            rowNumber
          });

          if (res.status !== "ok") {
            showMessage(res.message || "お知らせの読み込みに失敗しました。", "error");
            return;
          }

          currentEditRow = rowNumber;
          document.getElementById("editingAnnouncementRow").textContent = rowNumber;
          document.getElementById("announcementType").value = res.type || "通常";
          document.getElementById("announcementTitle").value = res.title || "";
          document.getElementById("announcementBody").value = res.body || "";
          document.getElementById("announcementVisible").value = res.visible || "表示";

          showMessage(`行 ${rowNumber} を読み込みました。`, "ok");
        } catch (error) {
          showMessage(error.message || "通信エラーが発生しました。", "error");
        }
      }

      async function hideAnnouncement(rowNumber) {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        if (!confirm(`行 ${rowNumber} を非表示にしますか？`)) {
          return;
        }

        try {
          const res = await jsonpRequest({
            api: "announcementHide",
            staffKey,
            rowNumber
          });

          if (res.status !== "ok") {
            showMessage(res.message || "非表示に失敗しました。", "error");
            return;
          }

          await loadAnnouncementList();
          showMessage(res.message || "非表示にしました。", "ok");
        } catch (error) {
          showMessage(error.message || "通信エラーが発生しました。", "error");
        }
      }
      
      async function saveAnnouncement() {
        const staffKey = getStaffKey();
        if (!staffKey) {
          showMessage("スタッフキーを入力してください。", "error");
          return;
        }

        const type = document.getElementById("announcementType").value || "通常";
        const title = document.getElementById("announcementTitle").value || "";
        const body = document.getElementById("announcementBody").value || "";
        const visible = document.getElementById("announcementVisible").value || "表示";

        try {
          const res = await jsonpRequest({
            api: "saveAnnouncement",
            staffKey,
            rowNumber: currentEditRow || "",
            type,
            title,
            body,
            visible
          });

          if (res.status !== "ok") {
            showMessage(res.message || "お知らせの保存に失敗しました。", "error");
            return;
          }

          await loadAnnouncementList();
            resetAnnouncementForm();
            showMessage(res.message || "お知らせを保存しました。", "ok");
        } catch (error) {
          showMessage(error.message || "通信エラーが発生しました。", "error");
        }
      }

    document.getElementById("saveAnnouncementButton").addEventListener("click", saveAnnouncement);
    document.getElementById("newAnnouncementButton").addEventListener("click", resetAnnouncementForm);
    document.getElementById("showCheckinMenuButton").addEventListener("click", showCheckinSection);
    document.getElementById("showAnnouncementMenuButton").addEventListener("click", showAnnouncementSection);
      
    setInterval(() => {
        if (getStaffKey()) {
          loadSummary();
          loadUncheckedList();
          loadCheckedInList();
          loadAnnouncementList();
        }
    }, 30000);

    showCheckinSection();
      
    </script>
  </body>
</html>
